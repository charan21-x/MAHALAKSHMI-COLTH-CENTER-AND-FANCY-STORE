<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            margin:0;
        }

        header{
            background:#000;
            color:white;
            padding:15px;
            text-align:center;
        }

        table{
            width:90%;
            margin:20px auto;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ccc;
            padding:10px;
            text-align:center;
        }

        th{
            background:#333;
            color:white;
        }
    </style>
</head>

<body>

<header>
    <h1>Admin Panel</h1>
</header>

<h2 style="text-align:center;">Customer Orders</h2>

<table>

<thead>
<tr>
<th>Customer</th>
<th>Phone</th>
<th>Product</th>
<th>Price</th>
<th>Address</th>
</tr>
</thead>

<tbody id="ordersTable">

</tbody>

</table>

<script src="admin.js"></script>

</body>
</html>
